version: '3.8'

services:
  frontend:
    build:
      context: ./bob-homepage
      dockerfile: Dockerfile
    container_name: bob-frontend
    ports:
      - "5173:80"
    restart: unless-stopped

  backend:
    build:
      context: ./web-qua-tet-voicechat
      dockerfile: Dockerfile
    container_name: bob-backend
    ports:
      - "7860:7860"
    env_file:
      - ./web-qua-tet-voicechat/.env
    environment:
      - PORT=7860
    restart: unless-stopped
